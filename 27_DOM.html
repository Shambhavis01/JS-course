<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning</title>
</head>
<body style="background-color: black; color: aliceblue;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
    
</body>
<script>
    function addLanguage(languageName) {
     //   const ul = document.querySelector('.language');
        const li = document.createElement('li');
        li.innerHTML = `${languageName}`;
      //  li.textContent = languageName;
      document.querySelector('.language').appendChild(li);
    
    }
    addLanguage("python");
    addLanguage("typeScript");

    function addOptiLanguage(languageName) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(languageName));
        document.querySelector('.language').appendChild(li);
    }
    addOptiLanguage("C++");
    //Edit
    const secondLang=document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML="Mojo"
    const newli=document.createElement('li');
    newli.textContent="Mojo"
    secondLang.replaceWith(newli)
    //edit
    const firstLang=document.querySelector("li:first-child")
    firstLang.outerHTML='<li>Java</li>'
    //remove
    const lastLang=document.querySelector("li:last-child")
    lastLang.remove()
   </script>
    </html>
